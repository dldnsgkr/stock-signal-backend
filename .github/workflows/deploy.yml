name: Deploy to EC2

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy ${{ github.ref_name }} to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GITHUB_REF_NAME
          script: |
            set -e
            cd ~/stock-signal-backend

            echo "=== Deploying tag: $GITHUB_REF_NAME ==="
            git fetch --tags
            git reset --hard
            git checkout $GITHUB_REF_NAME

            echo "=== pnpm install ==="
            sudo corepack enable
            pnpm install

            echo "=== prisma generate & migrate ==="
            cd apps/api
            pnpm prisma:generate
            pnpm prisma migrate deploy
            cd ~/stock-signal-backend

            echo "=== API build ==="
            cd apps/api
            pnpm build
            cd ~/stock-signal-backend

            echo "=== Python venv & deps ==="
            sudo apt-get install -y python3.12-venv
            cd apps/analysis-service
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt
            cd ~/stock-signal-backend

            echo "=== PM2 zero-downtime reload ==="
            pm2 reload ecosystem.config.js --env production || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "=== Deploy $GITHUB_REF_NAME complete ==="
